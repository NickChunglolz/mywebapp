version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - node -e 'const s=JSON.parse(process.env.secrets||"{}");require("fs").writeFileSync(".env.production",Object.entries(s).map(([k,v])=>`${k}=${v}`).join("\n")+"\n")'
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
