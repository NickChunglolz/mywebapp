version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E '^(GEMINI|GROQ|OLLAMA)_' > .env.production || true
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
