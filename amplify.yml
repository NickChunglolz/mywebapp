version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - node -e 'console.log("secrets-keys:", Object.keys(JSON.parse(process.env.secrets||"{}")).join(",")||"NONE")'
        - echo "GEMINI_API_KEY=$(node -pe 'JSON.parse(process.env.secrets||"{}").GEMINI_API_KEY||""')" >> .env.production
        - 'echo "bake-length=$(wc -c < .env.production)"'
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
