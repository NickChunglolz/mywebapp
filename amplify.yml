version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - |
          node -e '
            const fs = require("fs");
            const out = [];
            for (const [k, v] of Object.entries(process.env)) {
              if (/^(GEMINI|GROQ|OLLAMA)_/.test(k)) out.push(`${k}=${v}`);
            }
            if (process.env.secrets) {
              try {
                for (const [k, v] of Object.entries(JSON.parse(process.env.secrets))) out.push(`${k}=${v}`);
              } catch (e) { console.error("bad secrets json:", e.message); }
            }
            fs.writeFileSync(".env.production", out.join("\n") + "\n");
            console.log(`wrote ${out.length} vars to .env.production`);
          '
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
